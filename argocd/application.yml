apiVersion: argoproj.io/v1alpha1
kind: Application

metadata:
  name: go-app
  namespace: argocd

spec:
  project: default

  source:
    repoURL: https://github.com/g37111355-gif/golang-devops-project.git
    targetRevision: HEAD
    path: helm

  destination:
    server: https://kubernetes.default.svc
    namespace: go-web-app

  syncPolicy:
    automated:
      prune: true
      selfHeal: true